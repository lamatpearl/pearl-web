<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Pearl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; margin: 0; overflow-x: hidden; }
        .navbar { padding: 20px 0; background: #ffffff !important; border-bottom: 1px solid #eee; }
        .navbar-brand { font-weight: 900; font-style: italic; font-size: 1.8rem; color: #000; text-decoration: none; }

        .nav-link {
            color: #000 !important;
            font-weight: 600;
            margin: 0 10px;
            text-transform: capitalize;
            padding: 8px 20px !important;
            border-radius: 50px;
            transition: 0.3s;
        }

        .nav-link:hover { background-color: #fce4ec; color: #000 !important; }
        .btn-contact { background: #000; color: #fff !important; border-radius: 50px; padding: 10px 25px; text-decoration: none; }

        /* Ensures content doesn't get hidden under the fixed navbar */
        .main-wrapper { padding-top: 100px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Pearl.</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'projects' %}">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'skills' %}">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'education' %}">Education</a></li>
                </ul>
                <a href="{% url 'contact' %}" class="btn-contact">Contact</a>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
