{% extends 'portfolio/base.html' %}
{% load static %}

{% block content %}
<style>
    /* --- ADJUSTMENT PANEL --- */
    :root {
        --hey-y: 42%;
        --photo-y: 60%;
        --hey-gap: 260px;
        --photo-zoom: 1.1;
    }

    /* --- Hero Section Layout --- */
    .hero-section {
        position: relative;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #fff4d2 0%, #ffffff 70%);
    }

    /* Cursive Layer */
    .layer-cursive {
        position: absolute;
        width: 100%;
        top: var(--hey-y);
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        text-align: center;
        pointer-events: none;
    }

    .cursive-text {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: clamp(4rem, 15vw, 10rem);
        color: #ff69b4;
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: var(--hey-gap);
        white-space: nowrap;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
    }

    /* Photo Layer */
    .layer-photo {
        position: absolute;
        left: 50%;
        top: var(--photo-y);
        transform: translate(-50%, -50%);
        z-index: 2;
        text-align: center;
    }

    .profile-img {
        max-height: 85vh;
        transform: scale(var(--photo-zoom));
        filter: drop-shadow(0 20px 40px rgba(0,0,0,0.05));
    }

    /* Name Layer */
    .layer-name {
        position: absolute;
        bottom: 8%;
        left: 6%;
        z-index: 10;
    }

    .main-title {
        font-size: clamp(3.5rem, 12vw, 9rem);
        font-weight: 900;
        line-height: 0.75;
        letter-spacing: -5px;
        color: #1a1a1a;
    }

    /* Tagline Layer */
    .layer-titles {
        position: absolute;
        bottom: 8%;
        right: 6%;
        z-index: 10;
        text-align: right;
    }

    .tagline {
        font-weight: 800;
        font-size: 0.9rem;
        text-transform: uppercase;
        color: #1a1a1a;
    }

    /* --- 📱 MOBILE RESPONSIVE FIXES --- */
    @media (max-width: 768px) {
        :root {
            --hey-gap: 120px; /* Mas maliit na gap para sa "Hey, there" */
            --photo-y: 55%;   /* Itaas konti ang photo */
            --photo-zoom: 1.0; /* Bawasan ang zoom para kumasya */
        }

        .hero-section {
            height: 100vh;
            flex-direction: column; /* Stack vertically if needed */
        }

        .layer-name {
            bottom: 15%; /* Itaas para hindi matakpan ng nav/contact button */
            left: 5%;
        }

        .main-title {
            letter-spacing: -3px; /* Bawasan ang dikit ng letters */
        }

        .layer-titles {
            bottom: 5%;
            right: 5%;
            text-align: left; /* Mas madali basahin sa CP pag left-aligned */
            left: 5%; /* Full width alignment sa baba */
        }

        .cursive-text {
            font-size: clamp(3rem, 12vw, 5rem); /* Paliitin ang cursive text */
        }
    }

    /* Special fix for very small phones */
    @media (max-width: 480px) {
        :root {
            --hey-gap: 80px;
        }
        .main-title {
            font-size: 4rem;
        }
    }
</style>

<main class="hero-section">
    <div class="layer-cursive">
        <h2 class="cursive-text mb-0">
            <span>Hey,</span>
            <span>there</span>
        </h2>
    </div>

    <div class="layer-photo">
        <img src="{% static 'portfolio/img/pearl.png' %}" alt="Pearl" class="profile-img img-fluid">
    </div>

    <div class="layer-name">
        <h1 class="main-title mb-0">I AM<br>PEARL</h1>
    </div>

    <div class="layer-titles">
        <p class="text-uppercase tagline mb-0">
            COMPUTER SCIENCE STUDENT
        </p>
    </div>
</main>
{% endblock %}
