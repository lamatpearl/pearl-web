{% extends 'portfolio/base.html' %}
{% load static %}

{% block content %}
<style>
    /* --- ADJUSTMENT PANEL: ONLY CHANGE THESE NUMBERS --- */
    :root {
        /* 0% is the very top, 100% is the very bottom */
        --hey-y: 42%;    /* Move "Hey, there" up or down */
        --photo-y: 60%;  /* Move the Photo up or down */

        /* Keeping your other settings constant */
        --hey-gap: 260px;
        --photo-zoom: 1.1;
    }

    /* --- Navigation Revisions --- */
    .nav-link {
        text-transform: capitalize !important;
        padding: 8px 20px !important;
        border-radius: 50px !important;
        transition: 0.3s ease;
    }

    .nav-link:hover {
        background-color: #fce4ec !important;
        color: #000 !important;
    }

    /* --- Hero Section Layout --- */
    .hero-section {
        position: relative;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #fff4d2 0%, #ffffff 70%);
    }

    /* Adjustable 'Hey, there' Layer */
    .layer-cursive {
        position: absolute;
        width: 100%;
        top: var(--hey-y); /* Controlled by the variable above */
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        text-align: center;
        pointer-events: none;
    }

    .cursive-text {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: clamp(5rem, 15vw, 10rem);
        color: #ff69b4;
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: var(--hey-gap);
        white-space: nowrap;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
    }

    /* Adjustable Photo Layer */
    .layer-photo {
        position: absolute;
        left: 50%;
        top: var(--photo-y); /* Controlled by the variable above */
        transform: translate(-50%, -50%);
        z-index: 2;
        text-align: center;
    }

    .profile-img {
        max-height: 85vh;
        transform: scale(var(--photo-zoom));
        filter: drop-shadow(0 20px 40px rgba(0,0,0,0.05));
    }

    /* Static Layout Elements */
    .layer-name {
        position: absolute;
        bottom: 8%;
        left: 6%;
        z-index: 10;
    }

    .main-title {
        font-size: clamp(5rem, 12vw, 9rem);
        font-weight: 900;
        line-height: 0.75;
        letter-spacing: -7px;
        color: #1a1a1a;
    }

    .layer-titles {
        position: absolute;
        bottom: 8%;
        right: 6%;
        z-index: 10;
        text-align: right;
    }

    .tagline {
        font-weight: 800;
        font-size: 0.9rem;
        text-transform: uppercase;
        color: #1a1a1a;
    }
</style>

<main class="hero-section">

    <div class="layer-cursive">
        <h2 class="cursive-text mb-0">
            <span>Hey,</span>
            <span>there</span>
        </h2>
    </div>

    <div class="layer-photo">
        <img src="{% static 'portfolio/img/pearl.png' %}" alt="Pearl" class="profile-img img-fluid">
    </div>

    <div class="layer-name">
        <h1 class="main-title mb-0">I AM<br>PEARL</h1>
    </div>

    <div class="layer-titles">
        <p class="text-uppercase tagline mb-0">
            Junior Systems Administrator <br>
            & IT Professional
        </p>
        <p class="text-muted small mt-2" style="font-size: 0.75rem;">
            Specialized in Network Security, <br>
            Systems Deployment, and Tech Support.
        </p>
    </div>

</main>
{% endblock %}
